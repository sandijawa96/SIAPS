org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Xlint:none
android.useAndroidX=true
android.enableJetifier=true

# Suppress Java compilation warnings
android.suppressUnsupportedCompileSdk=true
org.gradle.warning.mode=none
android.suppressUnsupportedOptionWarnings=true

# Enable R8 full mode for better optimization
android.enableR8.fullMode=true

# Cross-drive pub cache on Windows can break Kotlin incremental caches.
# Keep local builds deterministic by disabling incremental/compiler caches here.
org.gradle.caching=false
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
kotlin.compiler.execution.strategy=in-process
