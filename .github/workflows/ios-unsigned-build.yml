name: iOS Unsigned Build for Ksign

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-unsigned-build.yml"
      - "mobileapp/**"
  workflow_dispatch:
    inputs:
      build_name:
        description: "Versi aplikasi, mis. 1.0.1"
        required: false
        type: string
      build_number:
        description: "Build number iOS, mis. 5"
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios-unsigned:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
        working-directory: mobileapp
    env:
      FLUTTER_VERSION: 3.32.5
      IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Show build context
        run: |
          echo "Git commit: $GITHUB_SHA"
          grep -n "platform :ios" ios/Podfile
          grep -n "IPHONEOS_DEPLOYMENT_TARGET" ios/Runner.xcodeproj/project.pbxproj | head

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Verify iOS deployment target
        run: |
          echo "Podfile platform:"
          grep -n "platform :ios" ios/Podfile

          echo "Runner deployment targets:"
          grep -n "IPHONEOS_DEPLOYMENT_TARGET" ios/Runner.xcodeproj/project.pbxproj | head

          echo "Flutter framework minimum OS:"
          grep -n -A1 "MinimumOSVersion" ios/Flutter/AppFrameworkInfo.plist

          echo "Firebase plugin podspec target:"
          if [ -f ios/.symlinks/plugins/firebase_core/ios/firebase_core.podspec ]; then
            grep -n "deployment_target" ios/.symlinks/plugins/firebase_core/ios/firebase_core.podspec
          else
            echo "::warning::firebase_core podspec belum tersedia sebelum pod install"
          fi

          if ! grep -q "platform :ios, '15.0'" ios/Podfile; then
            echo "::error::ios/Podfile tidak memakai platform iOS 15.0"
            exit 1
          fi

          if grep -q "IPHONEOS_DEPLOYMENT_TARGET = 1[0-4]\\." ios/Runner.xcodeproj/project.pbxproj; then
            echo "::error::Masih ada IPHONEOS_DEPLOYMENT_TARGET di bawah iOS 15.0"
            exit 1
          fi

      - name: Install CocoaPods dependencies
        run: |
          pod --version
          rm -rf ios/Pods ios/Podfile.lock
          cd ios
          pod install --repo-update

      - name: Restore Firebase iOS config
        run: |
          if [ -n "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo -n "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "GoogleService-Info.plist restored from GitHub Secret."
          elif [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "::warning::ios/Runner/GoogleService-Info.plist tidak ada. Jika Firebase iOS aktif, tambahkan secret IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64."
          fi

      - name: Build iOS app without code signing
        run: |
          BUILD_ARGS=(build ios --release --no-codesign)

          if [ -n "${{ inputs.build_name }}" ]; then
            BUILD_ARGS+=("--build-name=${{ inputs.build_name }}")
          fi

          if [ -n "${{ inputs.build_number }}" ]; then
            BUILD_ARGS+=("--build-number=${{ inputs.build_number }}")
          fi

          flutter "${BUILD_ARGS[@]}"

      - name: Package unsigned IPA for Ksign
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          IPA_DIR="build/ios/unsigned-ipa"
          IPA_PATH="build/ios/siaps-ios-unsigned-${GITHUB_RUN_NUMBER}.ipa"

          test -d "$APP_PATH" || { echo "Runner.app tidak ditemukan di $APP_PATH"; exit 1; }

          rm -rf "$IPA_DIR" "$IPA_PATH"
          mkdir -p "$IPA_DIR/Payload"

          if [ -f ios/Runner/GoogleService-Info.plist ]; then
            cp ios/Runner/GoogleService-Info.plist "$APP_PATH/GoogleService-Info.plist"
          fi

          cp -R "$APP_PATH" "$IPA_DIR/Payload/Runner.app"

          (
            cd "$IPA_DIR"
            /usr/bin/zip -qry "../$(basename "$IPA_PATH")" Payload
          )

          ls -lh "$IPA_PATH"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa-ksign-${{ github.run_number }}
          path: mobileapp/build/ios/*.ipa
          if-no-files-found: error
